<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Math Challenge</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>

*{box-sizing:border-box;font-family:Arial;}

body{background:#0f172a;padding:40px 0;}

#game{
width:80%;
height:600px;
margin:auto;
background:#1e293b;
border-radius:12px;
overflow:hidden;
position:relative;
box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

header{
display:flex;
justify-content:space-between;
padding:15px 20px;
background:#020617;
color:white;
border-bottom:2px solid #0ea5e9;
}

#area{position:relative;height:calc(100% - 70px);}

#startScreen{
position:absolute;
width:100%;
height:100%;
background:url("alberteinstein.jpg");
background-size:cover;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
gap:30px;
z-index:10;
}

#startScreen::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.gameTitle{font-size:40px;color:white;z-index:2;}

.materias{display:flex;gap:10px;z-index:2;}

.materias button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#0ea5e9;
color:white;
cursor:pointer;
}

#niveisEnsino{
display:none;
position:absolute;
width:100%;
height:100%;
background:#020617;
z-index:15;
justify-content:center;
align-items:center;
flex-direction:column;
gap:20px;
color:white;
}

#niveisEnsino button{
padding:18px 30px;
border:none;
border-radius:12px;
font-size:18px;
background:linear-gradient(135deg,#0ea5e9,#2563eb);
color:white;
cursor:pointer;
width:250px;
}

#topicosMatematica{
display:none;
position:absolute;
width:100%;
height:100%;
background:#020617;
z-index:15;
justify-content:center;
align-items:center;
flex-direction:column;
gap:20px;
color:white;
}

.listaTopicos{
width:100%;
max-height:60vh;
overflow-y:auto;
display:flex;
justify-content:center;
}

.grupoTopicos{
display:none;
flex-direction:column;
gap:14px;
width:90%;
max-width:400px;
}

.topicoBtn{
width:100%;
padding:16px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#0ea5e9,#2563eb);
color:white;
font-size:16px;
cursor:pointer;
}

.fecharTopicos{
position:absolute;
top:20px;
right:25px;
width:40px;
height:40px;
border:none;
border-radius:50%;
background:#ef4444;
color:white;
cursor:pointer;
}

.voltar{
position:absolute;
top:20px;
left:25px;
width:40px;
height:40px;
border:none;
border-radius:50%;
background:#334155;
color:white;
cursor:pointer;
}

.dificuldadeBox{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:300px;
background:#020617;
padding:25px;
border-radius:12px;
flex-direction:column;
align-items:center;
gap:15px;
z-index:20;
color:white;
}

#btnIniciarTopico{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#22c55e,#16a34a);
color:white;
cursor:pointer;
}

.box{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
border-radius:12px;
display:flex;
flex-direction:column;
gap:10px;
color:white;
padding:20px;
}

.box input{
padding:8px;
border:none;
border-radius:6px;
font-size:18px;
}

.box button{
padding:10px;
border:none;
border-radius:6px;
background:#0ea5e9;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div id="game">

<header>
<div>❤️ <span id="vidas">5</span></div>
<div>Nível <span id="nivel">1</span></div>
<div>⭐ <span id="pontos">0</span></div>
<div>⏱ <span id="timer">10</span></div>
</header>

<div id="area">

<div id="startScreen">
<h1 class="gameTitle">Einstein Game</h1>
<div class="materias">
<button onclick="selecionarMateria()">Matemática</button>
</div>
</div>

<div id="niveisEnsino">

<button class="voltar" onclick="voltarInicio()">←</button>

<h2>Escolha o nível</h2>

<button onclick="abrirTopicos('basico')">Ensino Básico</button>
<button onclick="abrirTopicos('fundamental')">Ensino Fundamental</button>
<button onclick="abrirTopicos('medio')">Ensino Médio</button>

</div>

<div id="topicosMatematica">

<button class="voltar" onclick="voltarNiveis()">←</button>
<button class="fecharTopicos" onclick="fecharTopicos()">✖</button>

<h2>Escolha o tópico</h2>

<div class="listaTopicos">

<div class="grupoTopicos" id="topicosBasico">
<button class="topicoBtn" onclick="selecionarTopico('soma')">Adição</button>
<button class="topicoBtn" onclick="selecionarTopico('subtracao')">Subtração</button>
<button class="topicoBtn" onclick="selecionarTopico('multiplicacao')">Multiplicação</button>
<button class="topicoBtn" onclick="selecionarTopico('divisao')">Divisão</button>
<button class="topicoBtn" onclick="selecionarTopico('tabuada')">Tabuada</button>
</div>

<div class="grupoTopicos" id="topicosFundamental">
<button class="topicoBtn" onclick="selecionarTopico('fracoes')">Frações</button>
<button class="topicoBtn" onclick="selecionarTopico('porcentagem')">Porcentagem</button>
<button class="topicoBtn" onclick="selecionarTopico('regra3')">Regra de 3</button>
<button class="topicoBtn" onclick="selecionarTopico('proporcao')">Razão e Proporção</button>
<button class="topicoBtn" onclick="selecionarTopico('potencia')">Potenciação</button>
<button class="topicoBtn" onclick="selecionarTopico('tabelas')">Tabelas e Gráficos</button>
<button class="topicoBtn" onclick="selecionarTopico('medidas')">Medidas</button>
<button class="topicoBtn" onclick="selecionarTopico('geometria')">Geometria</button>
<button class="topicoBtn" onclick="selecionarTopico('algebraFundamental')">Álgebra</button>
<button class="topicoBtn" onclick="selecionarTopico('estatistica')">Estatística</button>
</div>

<div class="grupoTopicos" id="topicosMedio">
<button class="topicoBtn" onclick="selecionarTopico('equacao1')">Equação 1º Grau</button>
<button class="topicoBtn" onclick="selecionarTopico('equacao2')">Equação 2º Grau</button>
<button class="topicoBtn" onclick="selecionarTopico('algebra')">Expressões Algébricas</button>
</div>

</div>
</div>

<div id="selecaoDificuldade" class="dificuldadeBox">

<h3 id="topicoEscolhido"></h3>

<label><input type="radio" name="dificuldade" value="facil" checked> Fácil</label>
<label><input type="radio" name="dificuldade" value="medio"> Médio</label>
<label><input type="radio" name="dificuldade" value="dificil"> Difícil</label>
<label><input type="radio" name="dificuldade" value="enem"> ENEM</label>

<button id="btnIniciarTopico" onclick="iniciarTopico()">Iniciar Game</button>

</div>

</div>
</div>

<script>

/* SONS */

const somLoop = new Audio("sounds/loop.mp3")
somLoop.loop=true

const somStart = new Audio("sounds/start.mp3")
const somCorrect = new Audio("sounds/correct.mp3")
const somWrong = new Audio("sounds/wrong.mp3")

/* VARIÁVEIS */

let dificuldade="facil"
let topicoAtual=""

let vidas=5
let pontos=0
let nivel=1

let resposta
let tempo=10
let intervalo

/* NAVEGAÇÃO */

function selecionarMateria(){
somStart.play()
somLoop.play()
startScreen.style.display="none"
niveisEnsino.style.display="flex"
}

function voltarInicio(){
niveisEnsino.style.display="none"
startScreen.style.display="flex"
}

function abrirTopicos(nivel){

niveisEnsino.style.display="none"
topicosMatematica.style.display="flex"

document.querySelectorAll(".grupoTopicos").forEach(g=>g.style.display="none")

if(nivel==="basico") topicosBasico.style.display="flex"
if(nivel==="fundamental") topicosFundamental.style.display="flex"
if(nivel==="medio") topicosMedio.style.display="flex"

}

function voltarNiveis(){
topicosMatematica.style.display="none"
niveisEnsino.style.display="flex"
}

function fecharTopicos(){
topicosMatematica.style.display="none"
startScreen.style.display="flex"
}

function selecionarTopico(topico){
topicoAtual=topico
topicoEscolhido.innerText="Tópico: "+topico
selecaoDificuldade.style.display="flex"
}

function iniciarTopico(){
dificuldade=document.querySelector('input[name="dificuldade"]:checked').value
topicosMatematica.style.display="none"
selecaoDificuldade.style.display="none"
novaRodada()
}

/* GERADOR DE CONTAS */

function gerarConta(){

let a=Math.floor(Math.random()*10)+1
let b=Math.floor(Math.random()*10)+1

switch(topicoAtual){

case "soma":
resposta=a+b
return `${a}+${b}`

case "subtracao":
resposta=a-b
return `${a}-${b}`

case "multiplicacao":
resposta=a*b
return `${a}×${b}`

case "divisao":
resposta=b
return `${a*b} ÷ ${a}`

case "tabuada":
resposta=a*b
return `${a} × ${b}`

case "fracoes":
resposta=a/b
return `${a}/${b} = ? (decimal)`

case "porcentagem":
resposta=(a*b)/100
return `${a}% de ${b*10}`

case "regra3":
resposta=(b*20)/10
return `Se 10 → 20 então ${b} → ?`

case "proporcao":
resposta=a/b
return `${a}:${b} = ?`

case "potencia":
resposta=Math.pow(a,2)
return `${a}²`

case "tabelas":
resposta=a+b
return `Tabela: ${a} gatos e ${b} cães. Total?`

case "medidas":
resposta=a*100
return `${a} metro(s) = ? centímetros`

case "geometria":
resposta=a*4
return `Perímetro de quadrado lado ${a}`

case "algebraFundamental":
resposta=a
return `x + ${b} = ${a+b}`

case "estatistica":
resposta=(a+b)/2
return `Média de ${a} e ${b}`

case "equacao1":
resposta=a
return `${a}+x=${a*2}`

case "equacao2":
resposta=1
return `x² -1 =0`

case "algebra":
resposta=a+b
return `Simplifique: ${a}+${b}`

}

}

/* NÍVEL */

function verificarNivel(){
if(pontos>=nivel*100){
nivel++
document.getElementById("nivel").innerText=nivel
Swal.fire("Subiu de nível!","Agora nível "+nivel,"success")
}
}

/* TIMER */

function iniciarTimer(){

tempo=10+(nivel-1)*10
timer.innerText=tempo

clearInterval(intervalo)

intervalo=setInterval(()=>{

tempo--
timer.innerText=tempo

if(tempo<=0){

clearInterval(intervalo)

vidas--
document.getElementById("vidas").innerText=vidas

somWrong.play()

Swal.fire("Tempo esgotado","Resposta: "+resposta,"info")

if(vidas<=0)gameOver()
else setTimeout(novaRodada,1500)

}

},1000)

}

/* PERGUNTA */

function criarBox(){

let old=document.querySelector(".box")
if(old)old.remove()

let box=document.createElement("div")
box.className="box"

let label=document.createElement("label")
label.innerText=gerarConta()

let input=document.createElement("input")

let btn=document.createElement("button")
btn.innerText="Confirmar"

btn.onclick=()=>{

clearInterval(intervalo)

if(parseFloat(input.value)==resposta){

somCorrect.play()

pontos+=10
document.getElementById("pontos").innerText=pontos

verificarNivel()

novaRodada()

}else{

somWrong.play()

vidas--
document.getElementById("vidas").innerText=vidas

Swal.fire("Errado","Resposta correta: "+resposta,"warning")

if(vidas<=0)gameOver()
else setTimeout(novaRodada,1500)

}

}

box.appendChild(label)
box.appendChild(input)
box.appendChild(btn)

area.appendChild(box)

input.focus()

iniciarTimer()

}

function novaRodada(){
criarBox()
}

function gameOver(){

somLoop.pause()

Swal.fire(
"Game Over",
"Pontuação: "+pontos,
"error"
).then(()=>location.reload())

}

</script>

</body>
</html>
