<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Math Challenge</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="game">

<header>

<div>❤️ <span id="vidas">5</span></div>
<div>Nível <span id="nivel">1</span></div>
<div>⭐ <span id="pontos">0</span></div>
<div>⏱ <span id="timer">10</span></div>

</header>

<div id="progressContainer">
<div id="progressBar"></div>
</div>

<div id="area">

<div id="startScreen">

<button class="menuBtn" onclick="iniciarModo('normal')">
Modo Normal
</button>

<button class="menuBtn" onclick="iniciarModo('enem')">
Modo ENEM
</button>

<button class="menuBtn" onclick="iniciarModo('treino')">
Modo Treino
</button>

<h1 class="gameTitle">Math Challenge</h1>

<button id="startBtn">
Iniciar Game
</button>

</div>

</div>

<!-- BARRA DE RESPOSTA FIXA -->

<div id="respostaContainer" class="respostaContainer">

<input
id="respostaInput"
class="respostaInput"
type="number"
inputmode="numeric"
placeholder="Digite a resposta"
/>

<button id="confirmarBtn">
OK
</button>

</div>

</div>

<!-- SONS -->

<audio id="startSound">
<source src="start.mp3">
</audio>

<audio id="bgMusic" loop>
<source src="loop.mp3">
</audio>

<audio id="correctSound">
<source src="correct.mp3">
</audio>

<audio id="wrongSound">
<source src="wrong.mp3">
</audio>

<script src="script.js"></script>

</body>
</html>
