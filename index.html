<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Math Challenge</title>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0f172a;
padding:40px 0;
}

/* GAME */

#game{
width:900px;
max-width:95%;
height:600px;
margin:0 auto;
background:#1e293b;
border-radius:12px;
overflow:hidden;
position:relative;
box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:#020617;
color:white;
font-size:18px;
border-bottom:2px solid #0ea5e9;
}

/* PROGRESSO */

#progressContainer{
width:100%;
height:8px;
background:#1e293b;
}

#progressBar{
height:8px;
width:0%;
background:linear-gradient(90deg,#22c55e,#4ade80);
transition:0.3s;
}

/* AREA */

#area{
position:relative;
width:100%;
height:calc(100% - 70px);
overflow:hidden;
}

/* TELA INICIAL */

#startScreen{
position:absolute;
width:100%;
height:100%;
background-image:url("imgjogo.png");
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
gap:20px;
z-index:10;
}

#startScreen::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.gameTitle{
font-size:42px;
color:white;
z-index:2;
}

/* BOTÕES */

.menuBtn{
z-index:2;
padding:12px 28px;
font-size:16px;
border:none;
border-radius:8px;
background:#0ea5e9;
color:white;
cursor:pointer;
transition:0.3s;
}

.menuBtn:hover{
background:#0284c7;
transform:scale(1.05);
}

#startBtn{
z-index:2;
padding:18px 40px;
font-size:22px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
cursor:pointer;
transition:0.3s;
}

#startBtn:hover{
transform:scale(1.05);
background:#16a34a;
}

/* BOX */

.box{
position:absolute;
padding:25px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
border-radius:12px;
border:2px solid rgba(255,255,255,0.2);
display:flex;
flex-direction:column;
gap:10px;
min-width:220px;
color:white;
font-size:22px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
transition:all 10s linear;
}

.box input{
padding:8px;
border:none;
border-radius:6px;
font-size:18px;
outline:none;
}

.box button{
padding:10px;
border:none;
border-radius:6px;
background:#0ea5e9;
color:white;
font-size:16px;
cursor:pointer;
}

.box button:hover{
background:#0284c7;
}

#timer{
color:#facc15;
font-weight:bold;
}

.alerta{
    color: white;
}
.fechar{
    display: none;
}

</style>
</head>

<body>
 

<div id="game">

<header>
<div>❤️ <span id="vidas">5</span></div>
<div>Nível <span id="nivel">1</span></div>
<div>⭐ <span id="pontos">0</span></div>
<div>⏱ <span id="timer">10</span></div>
</header>

<div id="progressContainer">
<div id="progressBar"></div>
</div>

<div id="area">

<div id="startScreen">

<button class="menuBtn" onclick="iniciarModo('normal')">Modo Normal</button>
<button class="menuBtn" onclick="iniciarModo('enem')">Modo ENEM</button>
<button class="menuBtn" onclick="iniciarModo('treino')">Modo Treino</button>

<h1 class="gameTitle">Math Challenge</h1>

<button id="startBtn">Iniciar Game</button>

</div>

</div>

</div>

<!-- SONS -->

<audio id="startSound"><source src="start.mp3"></audio>
<audio id="bgMusic" loop><source src="loop.mp3"></audio>
<audio id="correctSound"><source src="correct.mp3"></audio>
<audio id="wrongSound"><source src="wrong.mp3"></audio>

<script>
    

/* VARIÁVEIS */

let modoJogo="normal"
let treinoTipo="geral"

let vidas=5
let pontos=0
let nivel=1
let resposta

let progresso=0
let metaNivel=5

let tempo=10
let intervalo

/* MODO */

function iniciarModo(modo){

modoJogo=modo
document.getElementById("startBtn").click()

}

/* TEMPO POR NÍVEL */

function definirTempo(){

/* MODO TREINO — MAIS TEMPO PARA PENSAR */

if(modoJogo === "treino"){
    tempo = 30
    return
}

/* MODO NORMAL / ENEM — ESCALA DE DIFICULDADE */

if(nivel < 5) tempo = 10
else if(nivel < 10) tempo = 15
else if(nivel < 20) tempo = 20
else tempo = 30

}

/* GERAR CONTA */

function gerarConta(){

if(modoJogo==="enem") return perguntasEnem()
if(modoJogo==="treino") return perguntasTreino()

/* BASICO */

if(nivel<=3){

let a=Math.floor(Math.random()*10)+1
let b=Math.floor(Math.random()*10)+1

let ops=["+","-","*"]
let op=ops[Math.floor(Math.random()*3)]

resposta=eval(`${a}${op}${b}`)

return `${a} ${op} ${b}`

}

/* EXPRESSÕES */

if(nivel<=6){

let a=Math.floor(Math.random()*20)
let b=Math.floor(Math.random()*20)
let c=Math.floor(Math.random()*20)

let ops=["+","-","*"]

let op1=ops[Math.floor(Math.random()*3)]
let op2=ops[Math.floor(Math.random()*3)]

let exp=`${a} ${op1} ${b} ${op2} ${c}`

resposta=eval(exp)

return exp

}

/* PARÊNTESES */

if(nivel<=10){

let a=Math.floor(Math.random()*20)
let b=Math.floor(Math.random()*20)
let c=Math.floor(Math.random()*20)

let exp=`(${a}+${b})*${c}`

resposta=eval(exp)

return exp

}

/* POTÊNCIA */

if(nivel<=15){

let a=Math.floor(Math.random()*5)+2
let b=Math.floor(Math.random()*3)+2

resposta=a**b

return `${a} ^ ${b}`

}

/* REGRA DE 3 */

let a=2
let b=3
let c=10

resposta=15

return `Se 2/3 = ${c}/x, qual é x?`

}

/* POSIÇÃO */

function posicao(){

let area=document.getElementById("area")

return{
x:Math.random()*(area.clientWidth-220),
y:Math.random()*(area.clientHeight-120)
}

}

/* BARRA */

function atualizarBarra(){

let p=(progresso/metaNivel)*100
document.getElementById("progressBar").style.width=p+"%"

}

/* TIMER */

function iniciarTimer(){

definirTempo()

document.getElementById("timer").innerText=tempo

clearInterval(intervalo)

intervalo=setInterval(()=>{

tempo--
document.getElementById("timer").innerText=tempo

if(tempo<=0){

clearInterval(intervalo)

vidas--

document.getElementById("vidas").innerText=vidas

document.getElementById("wrongSound").play()

if(vidas<=0){gameOver();return}

novaRodada()

}

},1000)

}

/* BOX */

function criarBox(){

let area=document.getElementById("area")

let antiga=document.querySelector(".box")
if(antiga) antiga.remove()

let box=document.createElement("div")
box.className="box"

let p1=posicao()

box.style.left=p1.x+"px"
box.style.top=p1.y+"px"

let label=document.createElement("label")
label.innerText=gerarConta()

let input=document.createElement("input")

let btn=document.createElement("button")
btn.innerText="Confirmar"

/* VERIFICAR */

function verificar(){

clearInterval(intervalo)

let valor=Number(input.value)

if(valor===resposta){

document.getElementById("correctSound").play()

pontos+=10
progresso++

document.getElementById("pontos").innerText=pontos

atualizarBarra()

if(progresso>=metaNivel) proximoNivel()
else novaRodada()

}

else{

document.getElementById("wrongSound").play()

vidas--

document.getElementById("vidas").innerText=vidas

if(vidas<=0){gameOver();return}

novaRodada()

}

}

btn.onclick=verificar

input.addEventListener("keydown",e=>{
if(e.key==="Enter") verificar()
})

box.appendChild(label)
box.appendChild(input)
box.appendChild(btn)

area.appendChild(box)

setTimeout(()=>{

let p2=posicao()

box.style.left=p2.x+"px"
box.style.top=p2.y+"px"

},50)

setTimeout(()=>input.focus(),100)

iniciarTimer()

}

/* PRÓXIMO NÍVEL */

function proximoNivel(){

Swal.fire({
title:"🎉 Parabéns!",
text:"Você completou o nível "+nivel,
icon:"success",
confirmButtonText:"Continuar"
}).then(()=>{

nivel++
progresso=0
metaNivel+=2

document.getElementById("nivel").innerText=nivel

atualizarBarra()

novaRodada()

})

}

/* GAME OVER */

function gameOver(){

salvarRanking()

Swal.fire({
title:"Game Over",
html:`Pontuação: ${pontos}<br>Nível alcançado: ${nivel}`,
icon:"error",
confirmButtonText:"Ver Ranking"
}).then(()=>{
mostrarRanking()
})

}

/* NOVA RODADA */

function novaRodada(){
criarBox()
}

/* START */

document.getElementById("startBtn").onclick=()=>{

document.getElementById("startSound").play()

setTimeout(()=>{

document.getElementById("startScreen").style.display="none"

let music=document.getElementById("bgMusic")

music.volume=0.3
music.play()

novaRodada()

},400)

}

/* RANKING */

function salvarRanking(){

let ranking=JSON.parse(localStorage.getItem("rankingMathGame"))||[]

ranking.push({
pontos:pontos,
nivel:nivel,
data:new Date().toLocaleDateString()
})

ranking.sort((a,b)=>b.pontos-a.pontos)

ranking=ranking.slice(0,10)

localStorage.setItem("rankingMathGame",JSON.stringify(ranking))

}

function mostrarRanking(){

let ranking=JSON.parse(localStorage.getItem("rankingMathGame"))||[]

let html=""

ranking.forEach((r,i)=>{
html+=`${i+1}º - ${r.pontos} pontos (nível ${r.nivel})<br>`
})

if(html==="") html="Nenhum jogo registrado ainda."

Swal.fire({
title:"🏆 Ranking",
html:html
})

}

/* TREINO */

function perguntasTreino(){

let a=Math.floor(Math.random()*10)
let b=Math.floor(Math.random()*10)
let c=Math.floor(Math.random()*10)

let exp=`${a}+${b}*${c}`

resposta=eval(exp)

return exp

}

/* ENEM */

function perguntasEnem(){

let perguntas=[

{texto:"Uma torneira enche um tanque em 6 horas. Quantas horas duas torneiras levariam?",resp:3},

{texto:"Produto de 100 reais com aumento de 20%. Novo valor?",resp:120},

{texto:"Carro percorre 180km em 3h. Velocidade média?",resp:60},

{texto:"30 alunos, 40% meninas. Quantas?",resp:12},

{texto:"2^3 + 4 * 5",resp:28}

]

let p=perguntas[Math.floor(Math.random()*perguntas.length)]

resposta=p.resp

return p.texto

}

</script>

</body>
</html>
