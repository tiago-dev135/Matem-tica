
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Math Challenge</title>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0f172a;
padding:40px 0;
}

/* GAME */

#game{
width:900px;
max-width:95%;
height:600px;
margin:0 auto;
background:#1e293b;
border-radius:12px;
overflow:hidden;
position:relative;
box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:#020617;
color:white;
font-size:18px;
border-bottom:2px solid #0ea5e9;
}

/* PROGRESSO */

#progressContainer{
width:100%;
height:8px;
background:#1e293b;
}

#progressBar{
height:8px;
width:0%;
background:linear-gradient(90deg,#22c55e,#4ade80);
transition:0.3s;
}

/* AREA */

#area{
position:relative;
width:100%;
height:calc(100% - 70px);
overflow:hidden;
}

/* TELA INICIAL */

#startScreen{
position:absolute;
width:100%;
height:100%;
background-image:url("imgjogo.png");
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
gap:30px;
z-index:10;
}

#startScreen::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.gameTitle{
font-size:42px;
color:white;
z-index:2;
}

#startBtn{
z-index:2;
padding:18px 40px;
font-size:22px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
cursor:pointer;
transition:0.3s;
}

#startBtn:hover{
transform:scale(1.05);
background:#16a34a;
}

/* BOX */

.box{
position:absolute;
padding:25px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
border-radius:12px;
border:2px solid rgba(255,255,255,0.2);
display:flex;
flex-direction:column;
gap:10px;
min-width:200px;
color:white;
font-size:24px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
transition:all 10s linear;
}

.box input{
padding:8px;
border:none;
border-radius:6px;
font-size:18px;
outline:none;
}

.box button{
padding:10px;
border:none;
border-radius:6px;
background:#0ea5e9;
color:white;
font-size:16px;
cursor:pointer;
}

.box button:hover{
background:#0284c7;
}

#timer{
color:#facc15;
font-weight:bold;
}

</style>
</head>

<body>

<div id="game">

<header>

<div>❤️ <span id="vidas">5</span></div>

<div>Nível <span id="nivel">1</span></div>

<div>⭐ <span id="pontos">0</span></div>

<div>⏱ <span id="timer">10</span></div>

</header>

<div id="progressContainer">
<div id="progressBar"></div>
</div>

<div id="area">

<div id="startScreen">

<h1 class="gameTitle">Math Challenge</h1>

<button id="startBtn">Iniciar Game</button>

</div>

</div>

</div>

<!-- SONS -->

<audio id="startSound">
<source src="start.mp3">
</audio>

<audio id="bgMusic" loop>
<source src="loop.mp3">
</audio>

<audio id="correctSound">
<source src="correct.mp3">
</audio>

<audio id="wrongSound">
<source src="wrong.mp3">
</audio>

```html
<script>

/* VARIÁVEIS */

let vidas = 5
let pontos = 0
let nivel = 1
let resposta

let progresso = 0
let metaNivel = 5

let tempo = 10
let intervalo

/* GERADOR DE PERGUNTAS */

function gerarConta(){

/* NÍVEL 1 */

if(nivel === 1){

let n1 = Math.floor(Math.random()*10)+1
let n2 = Math.floor(Math.random()*10)+1

let ops = ["+","-","*"]

let op = ops[Math.floor(Math.random()*3)]

if(op==="+") resposta = n1+n2
if(op==="-") resposta = n1-n2
if(op==="*") resposta = n1*n2

return `${n1} ${op} ${n2}`

}

/* NÍVEL 2 */

if(nivel === 2){

let n1 = Math.floor(Math.random()*10)+1
let n2 = Math.floor(Math.random()*10)+1

let perguntas = [

{
texto:`João tinha ${n1} maçãs e ganhou mais ${n2}. Quantas ele tem agora?`,
resp:n1+n2
},

{
texto:`Maria tinha ${n1+n2} balas e comeu ${n2}. Quantas sobraram?`,
resp:(n1+n2)-n2
},

{
texto:`Uma caixa tem ${n1} fileiras com ${n2} ovos. Quantos ovos existem?`,
resp:n1*n2
}

]

let p = perguntas[Math.floor(Math.random()*perguntas.length)]

resposta = p.resp

return p.texto

}

/* NÍVEL 3 */

if(nivel >= 3){

let n1 = Math.floor(Math.random()*10)+1
let n2 = Math.floor(Math.random()*10)+1
let n3 = Math.floor(Math.random()*10)+1

let ops = ["+","-","*"]

let op1 = ops[Math.floor(Math.random()*3)]
let op2 = ops[Math.floor(Math.random()*3)]

let expressao = `${n1} ${op1} ${n2} ${op2} ${n3}`

resposta = eval(expressao)

return expressao

}

}

/* POSIÇÃO */

function posicao(){

let area = document.getElementById("area")

let largura = area.clientWidth - 200
let altura = area.clientHeight - 120

return{
x:Math.random()*largura,
y:Math.random()*altura
}

}

/* BARRA */

function atualizarBarra(){

let p = (progresso/metaNivel)*100

document.getElementById("progressBar").style.width = p+"%"

}

/* TIMER */

function iniciarTimer(){

tempo = 10
document.getElementById("timer").innerText = tempo

clearInterval(intervalo)

intervalo = setInterval(()=>{

tempo--
document.getElementById("timer").innerText = tempo

if(tempo <= 0){

clearInterval(intervalo)

document.getElementById("wrongSound").play()

vidas--

document.getElementById("vidas").innerText = vidas

if(vidas <= 0){

gameOver()
return

}

novaRodada()

}

},1000)

}

/* BOX */

function criarBox(){

let area = document.getElementById("area")

area.innerHTML=""

let box = document.createElement("div")

box.className="box"

let p1 = posicao()

box.style.left = p1.x+"px"
box.style.top = p1.y+"px"

let label = document.createElement("label")

label.innerText = gerarConta()

let input = document.createElement("input")

let btn = document.createElement("button")
btn.innerText = "Confirmar"

/* VERIFICAR */

function verificar(){

clearInterval(intervalo)

let valor = Number(input.value)

if(valor === resposta){

document.getElementById("correctSound").play()

pontos += 10
progresso++

document.getElementById("pontos").innerText = pontos

atualizarBarra()

if(progresso >= metaNivel){

proximoNivel()

}else{

novaRodada()

}

}else{

document.getElementById("wrongSound").play()

vidas--

document.getElementById("vidas").innerText = vidas

if(vidas <= 0){

gameOver()
return

}

novaRodada()

}

}

btn.onclick = verificar

input.addEventListener("keydown",(e)=>{

if(e.key==="Enter") verificar()

})

box.appendChild(label)
box.appendChild(input)
box.appendChild(btn)

area.appendChild(box)

/* MOVIMENTO */

setTimeout(()=>{

let p2 = posicao()

box.style.left = p2.x+"px"
box.style.top = p2.y+"px"

},50)

setTimeout(()=>input.focus(),100)

iniciarTimer()

}

/* PRÓXIMO NÍVEL */

function proximoNivel(){

Swal.fire({

title:"🎉 Parabéns!",
text:"Você completou o nível "+nivel,
icon:"success",
confirmButtonText:"Continuar"

}).then(()=>{

nivel++

progresso = 0
metaNivel += 2

document.getElementById("nivel").innerText = nivel

atualizarBarra()

novaRodada()

})

}

/* GAME OVER */

function gameOver(){

Swal.fire({

title:"Game Over",
text:"Pontuação: "+pontos,
icon:"error"

}).then(()=>{

location.reload()

})

}

/* NOVA RODADA */

function novaRodada(){

criarBox()

}

/* START */

document.getElementById("startBtn").onclick = () => {

document.getElementById("startSound").play()

setTimeout(()=>{

document.getElementById("startScreen").style.display = "none"

let music = document.getElementById("bgMusic")

music.volume = 0.3

music.play()

novaRodada()

},400)

}

</script>


</body>
</html>
