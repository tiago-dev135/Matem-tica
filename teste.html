<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Einstein Math Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
background:#0f172a;
font-family:Arial;
display:flex;
justify-content:center;
padding-top:40px;
}

#game{
width:800px;
height:600px;
background:#1e293b;
border-radius:12px;
overflow:hidden;
box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

header{
display:flex;
justify-content:space-around;
background:#020617;
color:white;
padding:12px;
font-size:18px;
}

#area{
height:100%;
position:relative;
}

.tela{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
color:white;
}

button{
padding:12px 22px;
border:none;
border-radius:10px;
background:#0ea5e9;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0284c7;
}

#startScreen{
background:url("alberteinstein.jpg");
background-size:cover;
}

#startScreen::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

#startScreen *{
z-index:2;
}

#boxPergunta{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
padding:25px;
border-radius:12px;
color:white;
text-align:center;
width:300px;
}

#boxPergunta input{
padding:10px;
font-size:18px;
border-radius:6px;
border:none;
margin-top:10px;
width:150px;
text-align:center;
}

</style>
</head>

<body>

<div id="game">

<header>
<div>❤️ <span id="vidas">5</span></div>
<div>⭐ <span id="pontos">0</span></div>
<div>📈 <span id="nivel">1</span></div>
<div>⏱ <span id="timer">10</span></div>
</header>

<div id="area">

<div id="startScreen" class="tela">
<h1>Einstein Math</h1>
<button onclick="selecionarMateria()">Matemática</button>
</div>

<div id="niveisEnsino" class="tela" style="display:none">

<h2>Escolha o tipo de ensino</h2>

<button onclick="abrirTopicos('fundamental')">Ensino Fundamental</button>
<button onclick="abrirTopicos('medio')">Ensino Médio</button>
<button onclick="abrirTopicos('enem')">ENEM</button>

<button onclick="modoSobrevivencia()">🧠 Modo Sobrevivência</button>

</div>

<div id="topicos" class="tela" style="display:none">

<h2>Escolha um tópico</h2>

<div id="listaTopicos"></div>

<button onclick="voltarEnsino()">Voltar</button>

</div>

<div id="boxPergunta">

<h2 id="pergunta"></h2>

<input id="respostaInput">

<br><br>

<button onclick="confirmar()">Responder</button>

</div>

</div>
</div>

<script>

/* ELEMENTOS */

const perguntaEl = document.getElementById("pergunta")
const input = document.getElementById("respostaInput")
const timerEl = document.getElementById("timer")

/* SONS */

const somLoop = new Audio("sounds/loop.mp3")
somLoop.loop=true

const somStart = new Audio("sounds/start.mp3")
const somCorrect = new Audio("sounds/correct.mp3")
const somWrong = new Audio("sounds/wrong.mp3")

/* VARIÁVEIS */

let ensino=""
let topico=""
let resposta=0
let explicacaoAtual=""

let sobrevivencia=false

let vidas=5
let pontos=0
let nivel=1

let tempo=10
let intervalo

/* IA ADAPTATIVA */

let desempenho = JSON.parse(localStorage.getItem("desempenho")) || {}

function registrar(tipo){

if(!desempenho[topico])
desempenho[topico]={acertos:0,erros:0}

if(tipo=="acerto")
desempenho[topico].acertos++
else
desempenho[topico].erros++

localStorage.setItem("desempenho",JSON.stringify(desempenho))

}

/* TELAS */

function selecionarMateria(){

document.getElementById("startScreen").style.display="none"
document.getElementById("niveisEnsino").style.display="flex"

}

/* MODO SOBREVIVÊNCIA */

function modoSobrevivencia(){

sobrevivencia=true

document.getElementById("niveisEnsino").style.display="none"
document.getElementById("boxPergunta").style.display="block"

somStart.play()
somLoop.play()

novaPergunta()

}

/* TOPICOS */

const topicosEnsino = {

fundamental:["soma","subtracao","multiplicacao","divisao","tabuada"],

medio:["fracoes","porcentagem","regra3","potencia","equacao"],

enem:["algebra","geometria","estatistica","porcentagem","equacao2"]

}

function abrirTopicos(tipo){

ensino=tipo

document.getElementById("niveisEnsino").style.display="none"
document.getElementById("topicos").style.display="flex"

let lista=document.getElementById("listaTopicos")
lista.innerHTML=""

topicosEnsino[tipo].forEach(t=>{

let b=document.createElement("button")
b.innerText=t
b.onclick=()=>iniciarTopico(t)

lista.appendChild(b)

})

}

function voltarEnsino(){

document.getElementById("topicos").style.display="none"
document.getElementById("niveisEnsino").style.display="flex"

}

/* INICIAR TOPICO */

function iniciarTopico(t){

topico=t

document.getElementById("topicos").style.display="none"
document.getElementById("boxPergunta").style.display="block"

somStart.play()
somLoop.play()

novaPergunta()

}

/* GERADOR DE NÚMEROS */

function numero(){

let base=10

if(nivel>3) base=30
if(nivel>6) base=80
if(nivel>10) base=200

return Math.floor(Math.random()*base)+1

}

/* IA SOBREVIVÊNCIA */

function gerarSobrevivencia(){

let tipo=Math.floor(Math.random()*6)

let a=numero()
let b=numero()

switch(tipo){

case 0:

resposta=a+b

return{
pergunta:`Quanto é ${a} + ${b}?`,
explicacao:`Somamos ${a} com ${b}. Resultado = ${resposta}`
}

case 1:

resposta=a*b

return{
pergunta:`Se uma caixa tem ${a} bolas e existem ${b} caixas, quantas bolas existem no total?`,
explicacao:`Multiplicamos ${a} × ${b} = ${resposta}`
}

case 2:

resposta=a-b

return{
pergunta:`João tinha ${a} maçãs e comeu ${b}. Quantas sobraram?`,
explicacao:`Subtração ${a} - ${b} = ${resposta}`
}

case 3:

resposta=(a*b)/100

return{
pergunta:`Quanto é ${a}% de ${b}?`,
explicacao:`${a}% de ${b} = (${a} × ${b}) ÷ 100 = ${resposta}`
}

case 4:

resposta=a/b

return{
pergunta:`Divida ${a} por ${b}. (decimal)`,
explicacao:`${a} ÷ ${b} = ${resposta}`
}

case 5:

resposta=a*a

return{
pergunta:`Qual é o quadrado de ${a}?`,
explicacao:`${a}² = ${a} × ${a} = ${resposta}`
}

}

}

/* GERADOR NORMAL */

function gerar(){

let a=numero()
let b=numero()

switch(topico){

case "soma":
resposta=a+b
explicacaoAtual=`Somamos ${a} + ${b}`
return `${a} + ${b}`

case "subtracao":
resposta=a-b
explicacaoAtual=`Subtração ${a} - ${b}`
return `${a} - ${b}`

case "multiplicacao":
resposta=a*b
explicacaoAtual=`Multiplicação ${a} × ${b}`
return `${a} × ${b}`

case "divisao":
resposta=b
explicacaoAtual=`${a*b} dividido por ${a} = ${b}`
return `${a*b} ÷ ${a}`

case "potencia":
resposta=a*a
explicacaoAtual=`${a}² = ${a} × ${a}`
return `${a}²`

case "equacao":
resposta=a
explicacaoAtual=`x + ${b} = ${a+b}`
return `x + ${b} = ${a+b}`

case "porcentagem":
resposta=(a*b)/100
explicacaoAtual=`${a}% de ${b}`
return `${a}% de ${b}`

default:
resposta=a+b
explicacaoAtual=`${a} + ${b}`
return `${a} + ${b}`

}

}

/* TIMER */

function iniciarTimer(){

tempo=10+(nivel*2)
timerEl.innerText=tempo

clearInterval(intervalo)

intervalo=setInterval(()=>{

tempo--
timerEl.innerText=tempo

if(tempo<=0){

clearInterval(intervalo)

vidas--
vidasEl()

somWrong.play()

alert("⏰ Tempo esgotado!\nResposta: "+resposta+"\n"+explicacaoAtual)

if(vidas<=0)gameOver()
else novaPergunta()

}

},1000)

}

/* NOVA PERGUNTA */

function novaPergunta(){

input.value=""

if(sobrevivencia){

let q=gerarSobrevivencia()

perguntaEl.innerText=q.pergunta
explicacaoAtual=q.explicacao

}else{

perguntaEl.innerText=gerar()

}

iniciarTimer()

}

/* CONFIRMAR */

function confirmar(){

clearInterval(intervalo)

let valor=parseFloat(input.value)

if(valor==resposta){

somCorrect.play()

pontos+=10
pontosEl()



if(pontos>=nivel*100){
nivel++
nivelEl()
}

}else{

somWrong.play()

vidas--
vidasEl()

alert("❌ Errado!\nResposta: "+resposta+"\n\n"+explicacaoAtual)

}

if(vidas<=0){
gameOver()
}else{
novaPergunta()
}

}

/* UI */

function vidasEl(){
document.getElementById("vidas").innerText=vidas
}

function pontosEl(){
document.getElementById("pontos").innerText=pontos
}

function nivelEl(){
document.getElementById("nivel").innerText=nivel
}

/* GAME OVER */

function gameOver(){

somLoop.pause()

alert("Game Over\nPontuação: "+pontos)

location.reload()

}

</script>

</body>
</html>
