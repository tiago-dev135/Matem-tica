<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Math Challenge</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>

*{box-sizing:border-box;font-family:Arial;}

body{background:#0f172a;padding:40px 0;}

#game{
width:80%;
height:600px;
margin:auto;
background:#1e293b;
border-radius:12px;
overflow:hidden;
position:relative;
box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

header{
display:flex;
justify-content:space-between;
padding:15px 20px;
background:#020617;
color:white;
border-bottom:2px solid #0ea5e9;
}

#area{position:relative;height:calc(100% - 70px);}

/* START */

#startScreen{
position:absolute;
width:100%;
height:100%;
background:url("imgjogo.png");
background-size:cover;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
gap:30px;
z-index:10;
}

#startScreen::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.gameTitle{font-size:40px;color:white;z-index:2;}

.materias{display:flex;gap:10px;z-index:2;}

.materias button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#0ea5e9;
color:white;
cursor:pointer;
}

/* NIVEIS */

#niveisEnsino{
display:none;
position:absolute;
width:100%;
height:100%;
background:#020617;
z-index:15;
justify-content:center;
align-items:center;
flex-direction:column;
gap:20px;
color:white;
}

#niveisEnsino button{
padding:18px 30px;
border:none;
border-radius:12px;
font-size:18px;
background:linear-gradient(135deg,#0ea5e9,#2563eb);
color:white;
cursor:pointer;
width:250px;
}

/* TOPICOS */

#topicosMatematica{
display:none;
position:absolute;
width:100%;
height:100%;
background:#020617;
z-index:15;
justify-content:center;
align-items:center;
flex-direction:column;
gap:20px;
color:white;
}

.listaTopicos{
width:100%;
max-height:60vh;
overflow-y:auto;
display:flex;
justify-content:center;
}

.grupoTopicos{
display:none;
flex-direction:column;
gap:14px;
width:90%;
max-width:400px;
}

.topicoBtn{
width:100%;
padding:16px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#0ea5e9,#2563eb);
color:white;
font-size:16px;
cursor:pointer;
}

/* BOTÕES */

.fecharTopicos{
position:absolute;
top:20px;
right:25px;
width:40px;
height:40px;
border:none;
border-radius:50%;
background:#ef4444;
color:white;
cursor:pointer;
}

.voltar{
position:absolute;
top:20px;
left:25px;
width:40px;
height:40px;
border:none;
border-radius:50%;
background:#334155;
color:white;
cursor:pointer;
}

/* DIFICULDADE */

.dificuldadeBox{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:300px;
background:#020617;
padding:25px;
border-radius:12px;
flex-direction:column;
align-items:center;
gap:15px;
z-index:20;
color:white;
}

#btnIniciarTopico{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#22c55e,#16a34a);
color:white;
cursor:pointer;
}

/* BOX PERGUNTA */

.box{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
border-radius:12px;
display:flex;
flex-direction:column;
gap:10px;
color:white;
padding:20px;
}

.box input{
padding:8px;
border:none;
border-radius:6px;
font-size:18px;
}

.box button{
padding:10px;
border:none;
border-radius:6px;
background:#0ea5e9;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div id="game">

<header>
<div>❤️ <span id="vidas">5</span></div>
<div>Nível <span id="nivel">1</span></div>
<div>⭐ <span id="pontos">0</span></div>
<div>⏱ <span id="timer">10</span></div>
</header>

<div id="area">

<div id="startScreen">
<h1 class="gameTitle">Math Challenge</h1>
<div class="materias">
<button onclick="selecionarMateria()">Matemática</button>
</div>
</div>

<div id="niveisEnsino">

<button class="voltar" onclick="voltarInicio()">←</button>

<h2>Escolha o nível</h2>

<button onclick="abrirTopicos('basico')">Ensino Básico</button>
<button onclick="abrirTopicos('fundamental')">Ensino Fundamental</button>
<button onclick="abrirTopicos('medio')">Ensino Médio</button>

</div>

<div id="topicosMatematica">

<button class="voltar" onclick="voltarNiveis()">←</button>
<button class="fecharTopicos" onclick="fecharTopicos()">✖</button>

<h2>Escolha o tópico</h2>

<div class="listaTopicos">

<div class="grupoTopicos" id="topicosBasico">
<button class="topicoBtn" onclick="selecionarTopico('soma')">Adição</button>
<button class="topicoBtn" onclick="selecionarTopico('subtracao')">Subtração</button>
<button class="topicoBtn" onclick="selecionarTopico('multiplicacao')">Multiplicação</button>
<button class="topicoBtn" onclick="selecionarTopico('divisao')">Divisão</button>
<button class="topicoBtn" onclick="selecionarTopico('tabuada')">Tabuada</button>
</div>

<div class="grupoTopicos" id="topicosFundamental">
<button class="topicoBtn" onclick="selecionarTopico('fracoes')">Frações</button>
<button class="topicoBtn" onclick="selecionarTopico('porcentagem')">Porcentagem</button>
<button class="topicoBtn" onclick="selecionarTopico('regra3')">Regra de 3</button>
<button class="topicoBtn" onclick="selecionarTopico('proporcao')">Razão e Proporção</button>
<button class="topicoBtn" onclick="selecionarTopico('potencia')">Potenciação</button>
</div>

<div class="grupoTopicos" id="topicosMedio">
<button class="topicoBtn" onclick="selecionarTopico('equacao1')">Equação 1º Grau</button>
<button class="topicoBtn" onclick="selecionarTopico('equacao2')">Equação 2º Grau</button>
<button class="topicoBtn" onclick="selecionarTopico('algebra')">Expressões Algébricas</button>
</div>

</div>
</div>

<div id="selecaoDificuldade" class="dificuldadeBox">

<h3 id="topicoEscolhido"></h3>

<label><input type="radio" name="dificuldade" value="facil" checked> Fácil</label>
<label><input type="radio" name="dificuldade" value="medio"> Médio</label>
<label><input type="radio" name="dificuldade" value="dificil"> Difícil</label>
<label><input type="radio" name="dificuldade" value="enem"> ENEM</label>

<button id="btnIniciarTopico" onclick="iniciarTopico()">Iniciar Game</button>

</div>

</div>
</div>

<script>

let dificuldade="facil"
let topicoAtual=""
let vidas=5
let pontos=0
let nivel=1
let resposta
let tempo=10
let intervalo

/* SONS */

const somLoop=new Audio("sounds/loop.mp3")
const somStart=new Audio("sounds/start.mp3")
const somCorrect=new Audio("sounds/correct.mp3")
const somWrong=new Audio("sounds/wrong.mp3")

somLoop.loop=true
somLoop.volume=0.3

/* NOMES */

const nomesTopicos={
soma:"Adição",
subtracao:"Subtração",
multiplicacao:"Multiplicação",
divisao:"Divisão",
tabuada:"Tabuada",
fracoes:"Frações",
porcentagem:"Porcentagem",
regra3:"Regra de 3",
proporcao:"Razão e Proporção",
potencia:"Potenciação",
equacao1:"Equação 1º Grau",
equacao2:"Equação 2º Grau",
algebra:"Expressões Algébricas"
}

/* DICAS DE ESTUDO */

const dicasEstudo={
soma:"Treine somas mentais e agrupamento de dezenas.",
subtracao:"Use a reta numérica para visualizar a subtração.",
multiplicacao:"Memorize a tabuada e use decomposição.",
divisao:"Divisão é o inverso da multiplicação.",
tabuada:"Pratique as tabuadas diariamente.",
fracoes:"Aprenda simplificação e equivalência.",
porcentagem:"Porcentagem significa dividir por 100.",
regra3:"Organize os valores em proporção.",
proporcao:"Entenda grandezas proporcionais.",
potencia:"Potência é multiplicação repetida.",
equacao1:"Isolar a incógnita resolve a equação.",
equacao2:"Use a fórmula de Bhaskara.",
algebra:"Treine simplificação de expressões."
}

/* NAVEGAÇÃO */

function selecionarMateria(){
startScreen.style.display="none"
niveisEnsino.style.display="flex"
}

function voltarInicio(){
niveisEnsino.style.display="none"
startScreen.style.display="flex"
}

function abrirTopicos(nivel){

niveisEnsino.style.display="none"
topicosMatematica.style.display="flex"

document.querySelectorAll(".grupoTopicos").forEach(g=>g.style.display="none")

if(nivel==="basico") topicosBasico.style.display="flex"
if(nivel==="fundamental") topicosFundamental.style.display="flex"
if(nivel==="medio") topicosMedio.style.display="flex"

}

function voltarNiveis(){
topicosMatematica.style.display="none"
niveisEnsino.style.display="flex"
}

function fecharTopicos(){
topicosMatematica.style.display="none"
startScreen.style.display="flex"
}

function selecionarTopico(topico){
topicoAtual=topico
topicoEscolhido.innerText="Tópico: "+nomesTopicos[topico]
selecaoDificuldade.style.display="flex"
}

/* INICIAR */

function iniciarTopico(){

somStart.play()
somLoop.play()

document.querySelectorAll('input[name="dificuldade"]').forEach(r=>{
if(r.checked)dificuldade=r.value
})

topicosMatematica.style.display="none"
selecaoDificuldade.style.display="none"

novaRodada()

}

/* GERADOR */

function gerarConta(){

let a=Math.floor(Math.random()*10)+1
let b=Math.floor(Math.random()*10)+1

if(topicoAtual==="soma"){resposta=a+b;return `${a}+${b}`}
if(topicoAtual==="subtracao"){resposta=a-b;return `${a}-${b}`}
if(topicoAtual==="multiplicacao"){resposta=a*b;return `${a}×${b}`}

if(topicoAtual==="divisao"){
resposta=b
return `${a*b} ÷ ${a}`
}

if(topicoAtual==="tabuada"){
resposta=a*b
return `${a}×${b}`
}

if(topicoAtual==="porcentagem"){
resposta=(a*b)/100
return `${b}% de ${a}`
}

}

/* NÍVEL */

function verificarNivel(){

if(pontos>=nivel*100){

nivel++
document.getElementById("nivel").innerText=nivel

Swal.fire({
title:"🎉 Subiu de nível!",
text:"Agora você está no nível "+nivel,
icon:"success",
focusConfirm:false
})

}

}

/* TIMER */

function iniciarTimer(){

tempo=10
timer.innerText=tempo

clearInterval(intervalo)

intervalo=setInterval(()=>{

tempo--
timer.innerText=tempo

if(tempo<=0){

clearInterval(intervalo)

somWrong.play()

vidas--
document.getElementById("vidas").innerText=vidas

Swal.fire({
title:"Tempo esgotado!",
text:"A resposta correta era: "+resposta,
icon:"info",
timer:1500,
showConfirmButton:false
})

if(vidas<=0)gameOver()
else setTimeout(novaRodada,1500)

}

},1000)

}

/* BOX */

function criarBox(){

let old=document.querySelector(".box")
if(old)old.remove()

let box=document.createElement("div")
box.className="box"

let label=document.createElement("label")
label.innerText=gerarConta()

let input=document.createElement("input")

let btn=document.createElement("button")
btn.innerText="Confirmar"

btn.onclick=()=>{

clearInterval(intervalo)

if(input.value==="")return

if(parseFloat(input.value)==resposta){

somCorrect.play()

pontos+=10
document.getElementById("pontos").innerText=pontos

verificarNivel()

novaRodada()

}else{

somWrong.play()

vidas--
document.getElementById("vidas").innerText=vidas

Swal.fire({
title:"Resposta incorreta",
text:"Resposta correta: "+resposta,
icon:"warning",
timer:1500,
showConfirmButton:false
})

if(vidas<=0)gameOver()
else setTimeout(novaRodada,1500)

}

}

box.appendChild(label)
box.appendChild(input)
box.appendChild(btn)

area.appendChild(box)

input.focus()

iniciarTimer()

}

function novaRodada(){
criarBox()
}

function gameOver(){

somLoop.pause()

let dica=dicasEstudo[topicoAtual] || "Continue praticando!"

Swal.fire({
title:"Game Over",
html:`Pontuação: <b>${pontos}</b><br><br>📚 <b>Dica:</b><br>${dica}`,
icon:"error",
focusConfirm:false
}).then(()=>location.reload())

}

</script>

</body>
</html>
